# Central Infrastructure - Database & Shared Services
# Manages shared services for all *.francony.fr apps
#
# Structure on ProDesk:
#   ~/Hosting/
#   ├── Infra/           <- this repo
#   ├── Bartending/      <- Tipsy app
#   └── Cash-a-lot/      <- Crypto trading bot
#
# Reverse proxy: Pangolin/Traefik on VPS (via Newt tunnel)
#
# Usage:
#   cd ~/Hosting/Infra
#   docker compose up -d

services:
  # ============================================
  # POSTGRESQL - Central Database (bartending + cashalot)
  # ============================================
  postgres:
    build:
      context: ../Bartending/Bartending_DB
      dockerfile: Dockerfile
    container_name: postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bartender}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password required}
      POSTGRES_DB: ${POSTGRES_DB:-bartending}
      CASHALOT_DB_PASSWORD: ${CASHALOT_DB_PASSWORD:?Cash-a-lot database password required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/01-create-cashalot-database.sh:/docker-entrypoint-initdb.d/01-create-cashalot-database.sh:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bartender} -d ${POSTGRES_DB:-bartending}"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy-network
      - bartending_network
      - cashalot_network

  # ============================================
  # WEBHOOK SERVER - Auto-deployment (hot-reload via watchfiles)
  # ============================================
  webhook:
    build:
      context: ./webhook-server
      dockerfile: Dockerfile
    container_name: webhook-server
    restart: unless-stopped
    command: ["watchfiles", "python server.py", "./"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health || exit 1"]
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}
      PIHOLE_PASSWORD: ${PIHOLE_PASSWORD:?Pi-hole password required}
      HOSTING_DIR: /home/bloster/Hosting
      PORT: 9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/bloster/Hosting:/home/bloster/Hosting
      # Source code mounted for hot-reload (overrides COPY in Dockerfile)
      - ./webhook-server:/app
      - /home/bloster/.git-credentials:/root/.git-credentials:ro
      - /home/bloster/.gitconfig:/root/.gitconfig:ro
      - /home/bloster/.ssh:/root/.ssh:ro
      - webhook_logs:/var/log/infra
      - /mnt/hdd:/mnt/hdd:ro
    networks:
      - proxy-network
      - cashalot_network
      - media_network

  # ============================================
  # PI-HOLE - DNS Ad Blocker
  # ============================================
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    oom_score_adj: -500
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    expose:
      - "80"
    environment:
      TZ: 'Europe/Paris'
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD:?Pi-hole password required}
      FTLCONF_dns_listeningMode: 'ALL'
      FTLCONF_dns_upstreams: '8.8.8.8;8.8.4.4'
    volumes:
      - pihole_data:/etc/pihole
    cap_add:
      - NET_ADMIN
    networks:
      - proxy-network

volumes:
  postgres_data:
  webhook_logs:
  pihole_data:

networks:
  proxy-network:
    name: proxy-network
    driver: bridge
  bartending_network:
    external: true
  cashalot_network:
    external: true
  media_network:
    external: true
